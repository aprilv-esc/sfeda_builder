<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Amlotenol</title>
    <script
      type="text/javascript"
      language="javascript"
      src="js/jquery.min.js"
    ></script>
    <!-- Favicon -->
    <link
      rel="shortcut icon"
      href="images/favicon.png"
      sizes="16x16"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <!-- Bootstrap, Owl Carousel and Animate.css -->
    <link href="css/plugins.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9"
      crossorigin="anonymous"
    />
    <!-- Custom -->
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/button-styles.css" rel="stylesheet" />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <!-- Responsive css -->
    <link href="css/media.css" rel="stylesheet" />
    <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
  </head>

  <body id="top">
    <main id="aspect-ratio-container">
      <!-- <div class="right-wrong">
        <img class="rwbuttons" src="images/amlotenol/check.png" alt="Check" />

        <img class="rwbuttons" src="images/amlotenol/wrong.png" alt="Wrong" />
      </div> -->
      <div class="results-button">
        <img
          id="correct-ans2"
          class="rwbuttons"
          src="images/amlotenol/check.png"
          alt=""
        />
        <img
          id="wrong-ans2"
          class="rwbuttons"
          src="images/amlotenol/wrong.png"
          alt=""
        />
      </div>
      <div class="button-nav-container">
        <button class="button-nav" onclick="navigate('assessments.html')">
          Questions
        </button>
      </div>

      <!-- Home Banner -->
      <div class="home-banner">
        <div id="myHomeBanner" class="carousel slide" data-ride="carousel">
          <div class="carousel-inner" role="listbox">
            <div
              class="item active"
              style="background-image: url('images/amlotenol/ques_2.png')"
            >
              <div class="container">
                <div class="banner-text"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- jQuery (necessary for JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJBFXayR94GL7l9oR1IsNbt-2KtnxpRjQ"></script>
    <script src="js/custom-google-map.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/custom.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
      crossorigin="anonymous"
    ></script>
    <script>
      document
        .getElementById("correct-ans2")
        .addEventListener("click", function () {
          // Store information about the correct answer in localStorage
          localStorage.setItem("container2Status", "correct");
          // Redirect back to index.html
          window.location.href = "assessments.html";
        });
      document
        .getElementById("wrong-ans2")
        .addEventListener("click", function () {
          // Store information about the correct answer in localStorage
          localStorage.setItem("container2Status", "wrong");
          // Redirect back to index.html
          window.location.href = "assessments.html";
        });
    </script>
    <script src="script.js"></script>
    <script
      type="text/javascript"
      language="javascript"
      src="js/control.js"
    ></script>
  </body>
</html>
