      <button class="button-nav qnadeets">

    <div class="container">

        <button class="button-graph" id="btnMono">
          Amlodipine monotherapy

        <button class="button-graph" id="btnPlusOne">Amlodipine + 1AHD</button>
        <button class="button-graph" id="btnPlusTwo">Amlodipine + 2AHD</button>

      <div class="inner-container">

            </div>
            <input
