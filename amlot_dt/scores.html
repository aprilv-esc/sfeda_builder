<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Amlotenol</title>
    <script
      type="text/javascript"
      language="javascript"
      src="js/jquery.min.js"
    ></script>
    <!-- Favicon -->
    <link
      rel="shortcut icon"
      href="images/favicon.png"
      sizes="16x16"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <!-- Bootstrap, Owl Carousel and Animate.css -->
    <link href="css/plugins.css" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9"
      crossorigin="anonymous"
    />
    <!-- Custom -->
    <link href="css/style.css" rel="stylesheet" />
    <link href="css/button-styles.css" rel="stylesheet" />
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <!-- Responsive css -->
    <link href="css/media.css" rel="stylesheet" />
  </head>

  <body id="top">
    <main id="aspect-ratio-container">
      <!-- <div class="right-wrong">
        <img class="rwbuttons" src="images/amlotenol/check.png" alt="Check" />

        <img class="rwbuttons" src="images/amlotenol/wrong.png" alt="Wrong" />
      </div> -->

      <div class="button-nav-container">
        <button class="button-nav" onclick="navigate('assessments.html')">
          Questions
        </button>
      </div>

      <!-- Home Banner -->
      <div class="home-banner">
        <div id="myHomeBanner" class="carousel slide" data-ride="carousel">
          <div class="carousel-inner" role="listbox">
            <div
              class="item active"
              style="background-image: url('images/amlotenol/scors_bg.gif')"
            >
              <div class="score-container">
                <ul id="scoresList">
                  <!-- Scores will be displayed here -->
                </ul>
                <div class="clearscore-btn">
                  <button id="clearScores">Clear Scores</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- jQuery (necessary for JavaScript plugins) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <!-- Include all compiled plugins (below), or include individual files as needed -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJBFXayR94GL7l9oR1IsNbt-2KtnxpRjQ"></script>
    <script src="js/custom-google-map.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/custom.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
      crossorigin="anonymous"
    ></script>

    <script src="script.js"></script>
    <script>
      // Retrieve quiz scores from local storage
      const quizScores = JSON.parse(localStorage.getItem("quizScores")) || [];
      console.log(quizScores);
      // Display the quiz scores on the page (you can customize this part)
      const scoresList = document.getElementById("scoresList");

      quizScores.forEach((quizScore, index) => {
        const listItem = document.createElement("li");
        listItem.textContent = `Quiz ${index + 1}:  ${quizScore.score}/6 (${
          quizScore.date
        })`;
        scoresList.appendChild(listItem);
      });

      const clearScoresButton = document.getElementById("clearScores");
      clearScoresButton.addEventListener("click", () => {
        // Clear the scores from local storage
        localStorage.removeItem("quizScores");

        // Remove the list of scores from the page
        scoresList.innerHTML = ""; // Clear the content of the <ul> element
      });
    </script>
    <script
      type="text/javascript"
      language="javascript"
      src="js/control.js"
    ></script>
  </body>
</html>
